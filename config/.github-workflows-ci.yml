name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install backend deps
        working-directory: ./
        run: npm install
      - name: Run backend tests
        working-directory: ./
        env:
          MONGO_URI: mongodb://localhost:27017/househunt
          JWT_SECRET: testsecret
        run: |
          npm test
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
